<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 - Tailwind CSS Perfume Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="max-w-6xl mx-auto px-4 py-12">

                    <div class="p-4 flex flex-col flex-grow">
                        <h5 class="text-xl font-bold text-gray-900 mb-2">Chanel No.5 Eau de Parfum</h5>
                        <p class="text-gray-500 text-sm flex-grow">xdghdryhnrdgnbdrt</p>

                    </div>
                </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-none shadow-sm flex flex-col h-full">

                    <h5 class="text-xl font-bold text-gray-900 mb-2">Chanel Coco Noir Eau de Parfum</h5>
                    <p class="text-gray-500 text-sm flex-grow">rawr</p>
                    <button class="w-full bg-gray-900 text-white font-medium py-2 px-4 rounded-none mt-4 hover:bg-gray-800 transition-colors duration-200">Buy Now</button>
                </div>
            </div>
        </div>
            
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-none shadow-sm flex flex-col h-full">
                <img src="https://www.chanel.com/images/t_one/w_0.41,h_0.41,c_crop/q_auto:good,f_auto,fl_lossy,dpr_1.1/w_1920/bleu-de-chanel-l-exclusif-parfum-spray-3-4fl-oz--packshot-default-107220-9566404706334.jpg" class="w-full h-auto object-cover" alt="Rose Mystique Perfume">

                        <h5 class="text-xl font-bold text-gray-900 mb-2">Chanel Bleu de Chanel Eau de Parfum</h5>

                        <button class="w-full bg-gray-900 text-white font-medium py-2 px-4 rounded-none mt-4 hover:bg-gray-800 transition-colors duration-200">Buy Now</button>
                    </div>
            </div>
        </div>
    </div>

</html>

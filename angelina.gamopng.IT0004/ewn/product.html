        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function buildProductCard(p) {
            return `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <span class="brand-badge">${p.brand}</span>
                    <h3>${p.name}</h3>
                    <p>₱${p.price.toFixed(2)}</p>
                    <button class="add-to-cart-btn" onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})">Add to Cart</button>
                </div>
            `;
        }

        function displayProducts() {
            const chosenBrand = getParam('brand');
            const contentContainer = document.getElementById('catalog-content');
            const title = document.getElementById('catalog-title');
            
            if (chosenBrand) {
                // Filter view state: Show only one specific brand
                const filtered = productsList.filter(p => p.brand.toLowerCase() === chosenBrand.toLowerCase());
                title.innerText = `${chosenBrand} Collection`;
                document.getElementById('reset-filter-btn').style.display = 'inline-block';
                
                contentContainer.innerHTML = `
                    <div class="product-grid">${filtered.map(p => buildProductCard(p)).join('')}</div>
                `;
            } else {
                // General view state: Group beautifully by categories
                title.innerText = "Our Makeup Collection";
                document.getElementById('reset-filter-btn').style.display = 'none';
                
                const categories = ["Face Essentials", "Cheeks Couture", "Lip Favorites", "Eye & Brow Artistry", "Skincare & Hybrids"];
                
                contentContainer.innerHTML = categories.map(cat => {
                    const catProducts = productsList.filter(p => p.category === cat);
                    return `
                        <h3 style="color:#933B5B; border-bottom:2px solid #9F9679; margin: 2.5rem 0 1rem 0; padding-bottom:0.5rem;">${cat === 'Face Essentials' ? '✨' : cat === 'Cheeks Couture' ? '🌸' : cat === 'Lip Favorites' ? '💄' : cat === 'Eye & Brow Artistry' ? '👁️' : '🌿'} ${cat}</h3>
                        <div class="product-grid">
                            ${catProducts.map(p => buildProductCard(p)).join('')}
                        </div>
                    `;
                }).join('');
            }
        }

        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('open'); updateCartUI(); }
        
        function addToCart(name, price) {
            cart.push({name, price});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cartItems').innerHTML = cart.map(item => `
                <li class="cart-item"><span>${item.name}</span><strong>₱${item.price.toFixed(2)}</strong></li>
            `).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').innerText = total.toLocaleString('en-US', {minimumFractionDigits:2});
        }

        // Run functions to initialize
        displayProducts();
        document.getElementById('cart-count').innerText = cart.length;
